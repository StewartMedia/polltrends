name: PolTrends Pipeline

on:
  schedule:
    - cron: '5 18 * * 1-6'
    - cron: '15 18 * * 0'
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: false
        default: daily
        type: choice
        options:
          - daily
          - weekly

concurrency:
  group: poltrends-pipeline
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        if: ${{ (github.event_name == 'schedule' && github.event.schedule == '5 18 * * 1-6') || (github.event_name == 'workflow_dispatch' && inputs.pipeline == 'daily') }}
        env:
          PYTHONUNBUFFERED: '1'
        run: python scripts/run_daily.py

      - name: Run weekly pipeline
        if: ${{ (github.event_name == 'schedule' && github.event.schedule == '15 18 * * 0') || (github.event_name == 'workflow_dispatch' && inputs.pipeline == 'weekly') }}
        env:
          PYTHONUNBUFFERED: '1'
        run: python scripts/run_weekly.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update PolTrends data: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
